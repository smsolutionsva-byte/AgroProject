# AgroSync Configuration File

# Flask Configuration
FLASK_ENV = development
FLASK_DEBUG = True
SECRET_KEY = your-secret-key-here

# Data paths (relative to project root)
DATA_PATH = data/
MODELS_PATH = data/trained_models/
DATASETS_PATH = data/datasets/
STATE_PATH = data/state/

# Model Configuration
DROUGHT_MODEL = data/trained_models/drought_brain.pkl
FLOOD_MODEL = data/trained_models/flood_brain.pkl
HEATWAVE_MODEL = data/trained_models/heatwave_brain.pkl

# API Configuration
OPEN_METEO_API = https://archive-api.open-meteo.com/v1/archive
TIMEOUT = 30

# Alert Thresholds
DROUGHT_THRESHOLD = 0.6
FLOOD_THRESHOLD = 0.6
HEATWAVE_THRESHOLD = 0.7

# Severity Levels
LOW_IMPACT_THRESHOLD = 0.3
MODERATE_IMPACT_THRESHOLD = 0.6
HIGH_IMPACT_THRESHOLD = 0.8

# Logging
LOG_LEVEL = INFO
LOG_FILE = logs/agrosync.log

# Bot Configuration
BOT_ENABLED = False
# BOT_TOKEN = your-bot-token-here
# WEBHOOK_URL = your-webhook-url-here
